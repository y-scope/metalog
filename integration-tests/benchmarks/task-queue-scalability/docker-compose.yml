services:
  mariadb:
    image: mariadb:10.6
    container_name: clp-mariadb-scalability
    command: >
      --max-connections=2000
      --innodb-flush-log-at-trx-commit=1
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: clp_metastore
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - ../../../src/main/resources/schema/schema-task-queue-mariadb.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10
