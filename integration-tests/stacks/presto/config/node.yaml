node:
  name: presto-stack-coordinator
  nodeIdEnvVar: HOSTNAME
  database:
    host: db
    port: 3306
    database: clp_metadata
    user: root
    password: password
    poolSize: 10
    poolMinIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
  grpcIngestion:
    enabled: true
    port: 9091
  health:
    enabled: true
    port: 8081

worker:
  numWorkers: 0

# No tables: — tables are auto-created on first gRPC insert via TableProvisioner
