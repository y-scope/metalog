services:
  # MariaDB — metadata database
  mariadb:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: metalog_metadata
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      metalog-network:
        aliases:
          - db

  # Coordinator — runs CoordinatorUnit + gRPC ingestion server
  coordinator:
    build:
      context: ../../..
      dockerfile: integration-tests/stacks/presto/Dockerfile
    command:
      - bash
      - -c
      - |
        until bash -c 'echo > /dev/tcp/db/3306' 2>/dev/null; do
          echo "Waiting for MariaDB..."; sleep 2
        done
        exec java -jar /app/metalog.jar /etc/clp/node.yaml
    volumes:
      - ./config/node.yaml:/etc/clp/node.yaml:ro
    ports:
      - "9091:9091"   # gRPC ingestion
      - "8081:8081"   # health check
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - metalog-network

  # Data loader — sends test records via gRPC; coordinator auto-creates the table
  data-loader:
    build:
      context: ../../..
      dockerfile: integration-tests/stacks/presto/Dockerfile.loader
    environment:
      GRPC_HOST: coordinator
      GRPC_PORT: "9091"
      TABLE_NAME: clp_cockroachdb
    depends_on:
      coordinator:
        condition: service_healthy
    restart: on-failure
    networks:
      - metalog-network

  # API server — gRPC query endpoint
  api-server:
    build:
      context: ../../..
      dockerfile: integration-tests/stacks/presto/Dockerfile
    command:
      - java
      - -cp
      - /app/metalog.jar
      - com.yscope.metalog.query.api.server.vertx.VertxApiServer
    ports:
      - "50051:50051"
    environment:
      DB_JDBC_URL: jdbc:mariadb://db:3306/metalog_metadata
      DB_USERNAME: root
      DB_PASSWORD: password
      API_GRPC_PORT: "50051"
    depends_on:
      coordinator:
        condition: service_healthy
    restart: on-failure
    networks:
      - metalog-network

networks:
  metalog-network:
    driver: bridge
