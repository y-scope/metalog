name: "publish-snapshot"

on:
  workflow_dispatch:

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"

  # Cancel in-progress jobs for efficiency
  cancel-in-progress: true

permissions: {}

jobs:
  publish:
    permissions: {}
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5"  # v4.3.1

      - uses: "actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9"  # v4.8.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          server-id: "central"
          server-username: "MAVEN_USERNAME"
          server-password: "MAVEN_PASSWORD"

      - name: "Verify SNAPSHOT version"
        run: |
          version="$(mvn --batch-mode help:evaluate -Dexpression=project.version -q -DforceStdout)"
          echo "Project version: ${version}"
          if [[ "${version}" != *-SNAPSHOT ]]; then
            echo "ERROR: Version '${version}' is not a SNAPSHOT. This workflow only publishes SNAPSHOTs."
            exit 1
          fi

      - name: "Publish SNAPSHOT to Sonatype"
        run: "mvn --batch-mode deploy -DskipTests"
        env:
          MAVEN_USERNAME: "${{secrets.SONATYPE_USERNAME}}"
          MAVEN_PASSWORD: "${{secrets.SONATYPE_TOKEN}}"

      - name: "Stage JARs with Maven-style timestamps"
        run: |
          timestamp="$(date -u +'%Y%m%d.%H%M%S')"
          for module_dir in core grpc-server kafka-ingestion; do
            module_name="metalog-${module_dir}"
            mkdir -p "staging/${module_name}"
            find "${module_dir}/target" -maxdepth 1 -name 'metalog-*.jar' -print0 \
              | while IFS= read -r -d '' jar; do
                  filename="$(basename "${jar}")"
                  renamed="${filename/-SNAPSHOT/-"${timestamp}"-1}"
                  cp "${jar}" "staging/${module_name}/${renamed}"
                done
          done
          echo "Staged artifacts:"
          find staging -type f

      - name: "Upload metalog-core"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02"  # v4.6.2
        with:
          name: "metalog-core"
          path: "staging/metalog-core/*"
          if-no-files-found: "error"

      - name: "Upload metalog-grpc-server"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02"  # v4.6.2
        with:
          name: "metalog-grpc-server"
          path: "staging/metalog-grpc-server/*"
          if-no-files-found: "error"

      - name: "Upload metalog-kafka-ingestion"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02"  # v4.6.2
        with:
          name: "metalog-kafka-ingestion"
          path: "staging/metalog-kafka-ingestion/*"
          if-no-files-found: "error"
