# Metalog Coordinator Configuration
# Environment variables override these defaults (checked via System.getenv())

# ============================================================================
# Feature Flags
# ============================================================================
# For minimal POC mode (Kafka → validation → database only), use defaults below.
# This mode only does: Kafka consumption → processing/validation → batch write.
#
# To enable full functionality, set:
#   coordinator.consolidation.enabled=true
#   coordinator.deletion.enabled=true

# Enable consolidation (planning and execution of IR → Archive)
# When false: files stay in IR state, no archive creation
# Default: false (minimal POC mode)
coordinator.consolidation.enabled=false

# Enable deletion of expired files from database and object storage
# When false: expired files remain until manually cleaned
# Default: false (minimal POC mode)
coordinator.deletion.enabled=false

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092
kafka.group.id=orchestrator
kafka.topic=clp_spark
kafka.consumer.max.poll.records=500
kafka.consumer.session.timeout.ms=30000

# Database Configuration
db.host=localhost
db.port=3306
db.database=metalog_metastore
db.user=root
db.password=password
db.table=clp_spark

# HikariCP Connection Pool
db.pool.maximum.size=10
db.pool.minimum.idle=2
db.pool.connection.timeout.ms=30000

# MinIO Configuration
minio.endpoint=http://localhost:9000
minio.access.key=minioadmin
minio.secret.key=minioadmin
minio.ir.bucket=logs
minio.archive.bucket=logs

# Aggregation Policy Configuration
policy.type=spark

# Spark Job Policy
policy.spark.grouping.strategy=dimension
policy.spark.grouping.keys=dim/str128/application_id
policy.spark.trigger.job.complete=true
policy.spark.trigger.timeout.hours=4
policy.spark.target.archive.size.mb=64

# Compression ratio learning (for archive size estimation)
policy.compression.ratio.initial=3.0
policy.compression.ratio.learning.rate=0.1

# Coordinator Configuration
coordinator.loop.interval.ms=5000
coordinator.task.timeout.minutes=10

# Maximum pending tasks in the task queue (default: 1000)
# When full, task submission blocks, providing backpressure to Kafka consumption
# Increase for high-volume deployments with many concurrent workers
coordinator.task.queue.max.size=1000

# ============================================================================
# Insert Performance Tuning
# ============================================================================
# See docs/operations/performance-tuning.md for detailed explanation of these settings.

# Batch size for database inserts (default: 500)
# Benchmark-optimized: 500 showed 14,506 records/sec (best among 100-2000)
# Larger batches increase memory usage and per-batch latency
coordinator.insert.batch.size=500

# Fast insert mode using INSERT IGNORE (default: false)
# When true: Uses INSERT IGNORE (faster, silently skips duplicates)
# When false: Uses INSERT ON DUPLICATE KEY UPDATE (safe for production)
# Enable for: initial bulk loads, data migrations, benchmarks
# Disable for: production (state updates require upsert semantics)
coordinator.insert.fast.enabled=false

# Worker Configuration (separate JVM processes)
# Workers poll the database directly for tasks (no gRPC)
worker.poll.interval.ms=5000
worker.id=

# Logging
log.level=INFO

# ============================================================================
# Partition Management Configuration
# ============================================================================
# The coordinator runs a background thread that manages table partitions.
# Partitions are created daily (UTC midnight boundary by default).
# Old partitions are cleaned up by merging into the first partition (never dropped with data).
#
# STARTUP BEHAVIOR: Coordinator BLOCKS on startup until partitions are created
# up to lookahead.days into the future. This ensures no data lands in p_future
# during normal operation (avoiding expensive REORGANIZE to move data later).

# Partition boundary configuration
partition.boundary.timezone=UTC
partition.boundary.hour=0

# Look-ahead: Create partitions this many days into the future
# Ensures p_future catch-all is rarely used (safety margin)
partition.lookahead.days=7

# Cleanup: Only consider partitions older than this for cleanup
# Should be > max retention (e.g., 395 days) + safety buffer
partition.cleanup.min-age-days=45

# Cleanup: Partitions with fewer rows than this threshold will be merged
# into the first partition (historical catch-all)
# Set to 0 to only cleanup truly empty partitions
partition.cleanup.row-threshold=1000

# Cleanup: How often to run the partition maintenance task (hours)
partition.cleanup.interval-hours=24

# Safety: Never DROP a partition with data - always REORGANIZE (merge) first
# When true: partitions with rows are merged into first partition, then boundary adjusted
# When false: (not recommended) allows DROP PARTITION if row count < threshold
partition.cleanup.safe-merge-only=true
