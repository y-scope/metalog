services:
  # MariaDB - Metadata catalog
  mariadb:
    image: mariadb:10.6
    container_name: clp-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: clp_metastore
    ports:
      - "${DB_PORT:-3306}:3306"  # Customizable via DB_PORT env var (default: 3306)
    volumes:
      - mariadb-data:/var/lib/mysql
      - ../src/main/resources/schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      clp-network:
        aliases:
          - db

  # Zookeeper - Required for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: clp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - clp-network

  # Kafka - Metadata message bus
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: clp-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"  # Customizable via KAFKA_PORT env var (default: 9092)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - clp-network

  # MinIO - Object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: clp-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"  # Customizable via MINIO_PORT env var (default: 9000)
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Customizable via MINIO_CONSOLE_PORT env var (default: 9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - clp-network

  # MinIO Client - Initialize buckets
  minio-init:
    image: minio/mc:latest
    container_name: clp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing minio/logs &&
      mc anonymous set download minio/logs &&
      mc mb --ignore-existing minio/log-viewer &&
      mc anonymous set download minio/log-viewer &&
      echo 'Buckets created successfully'
      "
    networks:
      - clp-network

  # Log Viewer Setup - Deploys YScope Log Viewer to MinIO
  log-viewer-setup:
    image: amazon/aws-cli:latest
    container_name: clp-log-viewer-setup
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      LOG_VIEWER_BUCKET: log-viewer
    entrypoint: >
      /bin/bash -c "
      yum install -y -q gzip jq tar &&
      DEPLOY_SCRIPT='y-scope/yscope-log-viewer/refs/heads/main/tools/deployment/s3/deploy.sh' &&
      curl -s https://raw.githubusercontent.com/$${DEPLOY_SCRIPT} | bash
      "
    networks:
      - clp-network

  # =========================================================================
  # CLP Node (coordinators + workers)
  # =========================================================================
  # Runs Node.main() which:
  #   1. Resolves nodeId from HOSTNAME env var (automatic in Docker)
  #   2. Initializes coordination schema
  #   3. Claims unassigned tables (fight-for-master)
  #   4. Starts CoordinatorUnits + shared WorkerUnit
  #
  # Connects to MariaDB via the 'db' network alias.
  # Scale: docker compose up -d --scale coordinator-node=3
  # Prerequisite: clp-core_*.deb must be present (docker/start.sh handles this).
  coordinator-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ../config/coordinator-node.yaml:/etc/clp/node.yaml:ro
    environment:
      # nodeIdEnvVar defaults to HOSTNAME, which Docker sets automatically
      # to the container ID (unique per replica)
      LOG_LEVEL: INFO
    deploy:
      replicas: 2
    networks:
      - clp-network
    restart: unless-stopped

volumes:
  mariadb-data:
  minio-data:

networks:
  clp-network:
    driver: bridge
